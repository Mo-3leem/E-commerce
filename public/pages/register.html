<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"
      integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="shortcut icon"
      href="../images/bag-shopping-solid.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../CSS/bootstrap.min.css" />
    <link rel="stylesheet" href="../CSS/header.css" />
    <link rel="stylesheet" href="../CSS/footer.css" />
    <link rel="stylesheet" href="../CSS/global.css" />
    <style>
      .fa-solid {
        color: var(--white);
      }
      body {
        text-shadow: 0 0.05rem 0.1rem rgba(0, 0, 0, 0.5);
        box-shadow: inset 0 0 5rem rgba(0, 0, 0, 0.5);
      }
      main {
        max-width: 500px;
      }
      footer {
        background-color: transparent;
      }
    </style>
    <title>Register page</title>
  </head>
  <body
    style="
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: center;
    "
    class="border text-center text-bg-dark"
  >
    <header class="flex">
      <a href="../index.html" class="logo">
        <i class="fa-solid fa-bag-shopping"></i>
        <span style="font-weight: bold">MAA</span>
        <p style="letter-spacing: 0.5px">Shopping</p>
      </a>

      <div class="links">
        <a style="position: relative" href="../pages/cart.html" class="cart">
          <i class="fa-solid fa-cart-shopping"></i>
          $0.00
          <span class="products-number">2</span>
        </a>
        <a href="./signin.html" class="sign-in">
          <i class="fa-solid fa-right-to-bracket"></i>
          Sign in</a
        >
        <a href="#" class="register border">
          <i class="fa-solid fa-user-plus"></i>
          Register</a
        >
      </div>
    </header>

    <main class="px-3">
      <form style="text-align: left">
        <div class="mb-4">
          <label for="Username" class="form-label">Username</label>
          <input
            type="email"
            class="form-control"
            id="Username"
            aria-describedby="emailHelp"
          />
        </div>

        <div class="mb-4">
          <label for="exampleInputEmail1" class="form-label"
            >Email address</label
          >
          <input
            type="email"
            class="form-control"
            id="exampleInputEmail1"
            aria-describedby="emailHelp"
          />
        </div>

        <div class="mb-4">
          <label for="exampleInputPassword1" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="exampleInputPassword1"
          />
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="exampleCheck1" />
          <label class="form-check-label" for="exampleCheck1"
            >Check me out</label
          >
        </div>
        <button type="submit" class="btn btn-primary">Create Acount</button>
      </form>
    </main>

    <footer class="lead">
      Designed and developed by
      <span>Mohammed Abdelaleem</span>
      <i class="fa-regular fa-copyright"></i>
      2024
    </footer>
  </body>
</html>
