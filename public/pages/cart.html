<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Page</title>
    <link rel="stylesheet" href="../CSS/global.css" />
    <link rel="stylesheet" href="../CSS/header.css" />
    <link rel="stylesheet" href="../CSS/footer.css" />
    
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"
      integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="shortcut icon"
      href="../images/bag-shopping-solid.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../CSS/pages/cart.css" />
  </head>
  <body
    style="
      grid-template-rows: auto 1fr auto;
      align-items: center;
      height: 100vh;
      display: grid;
    "
  >
    <header class="flex">
      <a href="../index.html" class="logo">
        <i class="fa-solid fa-bag-shopping"></i>
        <span style="font-weight: bold">MAA</span>
        <p style="letter-spacing: 0.5px">Shopping</p>
      </a>

      <div class="links">
        <a style="position: relative" href="" class="cart">
          <i class="fa-solid fa-cart-shopping"></i>
          $0.00
          <span class="products-number">2</span>
        </a>
        <a href="./signin.html" class="sign-in">
          <i class="fa-solid fa-right-to-bracket"></i>
          Sign in</a
        >
        <a href="./register.html" class="register">
          <i class="fa-solid fa-user-plus"></i>
          Register</a
        >
      </div>
    </header>

    <main class="" style="text-align: center">
      <section class="cart">
        <article class="product flex">
          <button><i class="fa-solid fa-trash-can"></i></button>
          <p class="price">$133</p>
          <div class="flex" style="margin-right: 1rem">
            <button class="decrease">-</button>
            <div class="quantity flex">3</div>
            <button class="increase">+</button>
          </div>
          <p class="title">Product title</p>
          <img
            style="border-radius: 0.22rem"
            width="70"
            height="70"
            alt=""
            src="../images/4.webp"
          />
        </article>

        <article class="product flex">
          <button><i class="fa-solid fa-trash-can"></i></button>
          <p class="price">$133</p>
          <div class="flex" style="margin-right: 1rem">
            <button class="decrease">-</button>
            <div class="quantity flex">3</div>
            <button class="increase">+</button>
          </div>
          <p class="title">Product title</p>
          <img
            style="border-radius: 0.22rem"
            width="70"
            height="70"
            alt=""
            src="../images/5.webp"
          />
        </article>

        <article class="product flex">
          <button><i class="fa-solid fa-trash-can"></i></button>
          <p class="price">$133</p>
          <div class="flex" style="margin-right: 1rem">
            <button class="decrease">-</button>
            <div class="quantity flex">3</div>
            <button class="increase">+</button>
          </div>
          <p class="title">Product title</p>
          <img
            style="border-radius: 0.22rem"
            width="70"
            height="70"
            alt=""
            src="../images/6.webp"
          />
        </article>
      </section>

      <button class="clear">
        <i
          style="color: var(--white); margin-right: 0.2rem"
          class="fa-solid fa-trash-can"
        ></i>
        Clear cart
      </button>

      <section class="summary">
        <h1>Cart summary</h1>
        <div class="flex">
          <p class="subtotal">Subtotal</p>
          <p>$1999</p>
        </div>
        <button disabled class="checkout">CHECKOUT</button>
        <a href="./signin.html">Please sign in to continue</a>
      </section>
    </main>

    <footer>
      Designed and developed by
      <span>Mohammed Abdelaleem</span>
      <i class="fa-regular fa-copyright"></i>
      2024
    </footer>
  </body>
</html>
